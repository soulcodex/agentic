name: Validate & Index

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Lint fragments, profiles, and adapters
        run: just lint

      - name: Install kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov

      - name: Run integration tests with coverage
        run: |
          rm -rf coverage
          kcov \
            --include-path="${PWD}/tooling/lib" \
            --exclude-path="${PWD}/tests,${PWD}/coverage" \
            ./coverage \
            ./tooling/lib/test.sh --library "${PWD}"

      - name: Read total coverage
        id: coverage
        run: |
          line_rate="$(grep -m1 -o 'line-rate=\"[0-9.]*\"' coverage/cobertura.xml | cut -d'"' -f2)"
          coverage_percent="$(awk "BEGIN { printf \"%.2f\", ${line_rate} * 100 }")"
          echo "line_rate=${line_rate}" >> "$GITHUB_OUTPUT"
          echo "coverage_percent=${coverage_percent}" >> "$GITHUB_OUTPUT"
          {
            echo "## Test Coverage"
            echo ""
            echo "Total line coverage: ${coverage_percent}%"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: kcov-html-report
          path: coverage/
          if-no-files-found: error

      - name: Rebuild indexes
        run: just index

      - name: Check index files are up to date
        run: |
          # generated_at is a wall-clock timestamp that always differs in CI.
          # Restore it to the committed value before diffing so only substantive
          # changes (added/removed fragments or skills) cause a failure.
          for file in index/fragments.json index/skills.json; do
            committed_at=$(git show HEAD:"$file" | jq -r '.generated_at')
            jq --arg t "$committed_at" '.generated_at = $t' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          done
          if ! git diff --quiet index/; then
            echo "Index files are out of date. Run 'just index' and commit the result."
            git diff index/
            exit 1
          fi

  docs-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r docs/.mkdocs/requirements.txt

      - name: Build docs (strict)
        run: cd docs/.mkdocs && mkdocs build --strict
